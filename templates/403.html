{% extends "base.html" %}
{% block title %}403 — Forbidden{% endblock %}
{% block content %}
<div class="card" style="text-align:center">
  <div style="font-size:4rem">&#x1F6AB;</div>
  <h2 style="margin-top:12px;color:#c62828">403 — Access Denied</h2>
  <p style="color:#555;margin-top:10px">
    You do not have permission to access this resource.
  </p>
  <a href="{{ url_for('index') }}" class="btn"
     style="display:inline-block;margin-top:24px;text-decoration:none;padding:10px 28px;width:auto">
    Go Home
  </a>
</div>
{% endblock %}
